<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة نِحرير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #0c2340; --gold: #c5a059; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: grid; grid-template-columns: 280px 1fr; }
        .sidebar { background: var(--primary); color: white; height: 100vh; padding: 20px; position: sticky; top: 0; }
        .nav-link { display: block; padding: 15px; color: #ecf0f1; text-decoration: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--primary); font-weight: bold; }
        .main { padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }
        .search-bar { width: 80%; padding: 15px; border-radius: 30px; border: 2px solid var(--gold); margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>منصة نِحرير</h2>
    <div class="nav-link active" onclick="showLectures()"><i class="fas fa-chalkboard-teacher"></i> المحاضرات</div>
    <div class="nav-link" onclick="loadCategory('books')"><i class="fas fa-book"></i> كتب علمية</div>
    <div class="nav-link" onclick="loadCategory('research')"><i class="fas fa-microscope"></i> دراسات وأبحاث</div>
    <div class="nav-link" onclick="loadExperts()"><i class="fas fa-user-md"></i> الخبراء</div>
    <a href="index.html" class="nav-link" style="background:#c0392b; margin-top:20px; text-align:center;">الرئيسية</a>
</div>
<div class="main">
    <input type="text" id="searchInput" class="search-bar" placeholder="ابحث هنا..." onkeyup="filterContent()" style="display:none;">
    <h1 id="pageTitle">المحاضرات الطبية</h1>
    <div id="displayGrid" class="grid"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showLectures() {
        document.getElementById('searchInput').style.display = 'none';
        document.getElementById('pageTitle').innerText = "المحاضرات الطبية";
        const list = [
            {t: 'الطب و الجراحة', i: 'fa-scalpel'}, {t: 'طب الأطفال', i: 'fa-baby'},
            {t: 'طب التخدير', i: 'fa-syringe'}, {t: 'طب النساء و التوليد', i: 'fa-female'},
            {t: 'طب المختبرات والتحاليل', i: 'fa-vials'}, {t: 'طب الأمراض الباطنية', i: 'fa-stethoscope'},
            {t: 'طب و جراحة العظام', i: 'fa-bone'}, {t: 'طب الأعصاب والعمود الفقري', i: 'fa-brain'}
        ];
        document.getElementById('displayGrid').innerHTML = list.map(l => `
            <div class="card" onclick="loadCategory('${l.t}')" style="cursor:pointer;">
                <i class="fas ${l.i}"></i><h3>${l.t}</h3>
            </div>`).join('');
    }

    async function loadCategory(cat) {
        document.getElementById('pageTitle').innerText = cat;
        document.getElementById('searchInput').style.display = 'block';
        const grid = document.getElementById('displayGrid');
        grid.innerHTML = 'جاري التحميل...';
        const snap = await db.collection('nihrir_data').where('category', '==', cat).get();
        grid.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `<div class="card item-card"><i class="fas fa-file-medical"></i><h3>${d.title}</h3><p>${d.description || ''}</p><a href="${d.link}" target="_blank">فتح المادة</a></div>`;
        });
    }

    function loadExperts() {
        document.getElementById('displayGrid').innerHTML = `<div class="card"><h3>أ. مهدي مستفاوي</h3><p>أخصائي تأهيل حركي</p></div>`;
    }

    function filterContent() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        Array.from(document.getElementsByClassName('item-card')).forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }
    window.onload = showLectures;
</script>
</body>
</html>
