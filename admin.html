<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة المركزية | نِحرير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --admin-bg: #1a1c23; --card-bg: #24262d; --gold: #c5a059; --text: #f4f5f7; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; background: var(--admin-bg); color: var(--text); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--card-bg); padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; }
        .card h3 { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 15px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 0.9rem; color: #9e9e9e; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #2d2f36; border: 1px solid #3f414a; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-upload { background: var(--gold); color: #1a1c23; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #2d2f36; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="header">
        <h1><i class="fas fa-user-shield"></i> لوحة الإدارة - نِحرير</h1>
        <a href="index.html" style="color: var(--gold); text-decoration: none;">العودة للموقع</a>
    </div>
    <div class="grid">
        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> إضافة محتوى جديد</h3>
            <label>اسم الدرس أو الكتاب</label>
            <input type="text" id="postTitle" placeholder="مثال: ميكانيكا الحركية">
            <label>الرابط (يوتيوب أو درايف)</label>
            <input type="text" id="postLink" placeholder="https://...">
            <label>القسم المختص</label>
            <select id="postCategory">
                <optgroup label="المحاضرات الطبية">
                    <option value="الطب و الجراحة">الطب و الجراحة</option>
                    <option value="طب الأطفال">طب الأطفال</option>
                    <option value="طب التخدير">طب التخدير</option>
                    <option value="طب النساء و التوليد">طب النساء و التوليد</option>
                    <option value="طب المختبرات والتحاليل">طب المختبرات والتحاليل</option>
                    <option value="طب الأمراض الباطنية">طب الأمراض الباطنية</option>
                    <option value="طب و جراحة العظام">طب و جراحة العظام</option>
                    <option value="طب الأعصاب والعمود الفقري">طب الأعصاب والعمود الفقري</option>
                </optgroup>
                <option value="books">كتب علمية</option>
                <option value="research">دراسات وأبحاث</option>
            </select>
            <label>وصف بسيط</label>
            <textarea id="postDesc" rows="3"></textarea>
            <button class="btn-upload" onclick="uploadContent()">نشر في المكتبة</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-user-check"></i> طلبات التسجيل</h3>
            <div id="pendingUsersList">جاري جلب الطلبات...</div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function uploadContent() {
        const title = document.getElementById('postTitle').value;
        const link = document.getElementById('postLink').value;
        const cat = document.getElementById('postCategory').value;
        const desc = document.getElementById('postDesc').value;

        if(!title || !link) return alert("الرجاء ملء العنوان والرابط");

        try {
            await db.collection('nihrir_data').add({
                title: title,
                link: link,
                category: cat,
                description: desc,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم النشر بنجاح في قسم " + cat);
            document.getElementById('postTitle').value = "";
            document.getElementById('postLink').value = "";
        } catch(e) { alert("خطأ: " + e.message); }
    }

    function loadPendingUsers() {
        db.collection('users').where('status', '==', 'pending').onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const u = doc.data();
                html += `<div class="user-row"><div><strong>${u.name}</strong><br><small>${u.email}</small></div>
                <button class="btn-approve" onclick="approveUser('${doc.id}')">موافقة</button></div>`;
            });
            document.getElementById('pendingUsersList').innerHTML = html || "لا توجد طلبات جديدة.";
        });
    }

    async function approveUser(id) {
        await db.collection('users').doc(id).update({ status: 'active' });
        alert("تم التفعيل بنجاح!");
    }
    window.onload = loadPendingUsers;
</script>
</body>
</html>
