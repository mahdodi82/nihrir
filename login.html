<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول | نِحرير</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0c2340; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="auth-box">
    <h2 id="title">تسجيل الدخول</h2>
    <input type="text" id="name" placeholder="الاسم الكامل" style="display:none;">
    <input type="email" id="email" placeholder="البريد">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="authAction()" id="btn">دخول</button>
    <p onclick="toggle()" id="toggle" style="cursor:pointer; font-size: 0.8rem; margin-top:15px;">إنشاء حساب جديد</p>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let mode = 'login';

    function toggle() {
        mode = mode === 'login' ? 'reg' : 'login';
        document.getElementById('name').style.display = mode === 'login' ? 'none' : 'block';
        document.getElementById('title').innerText = mode === 'login' ? 'تسجيل الدخول' : 'حساب جديد';
    }

    async function authAction() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(mode === 'login') {
            const res = await auth.signInWithEmailAndPassword(e, p);
            const doc = await db.collection('users').doc(res.user.uid).get();
            if(doc.data().status === 'active') window.location.href = 'index.html';
            else alert("حسابك قيد الانتظار");
        } else {
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection('users').doc(res.user.uid).set({ name: document.getElementById('name').value, email: e, status: 'pending' });
            alert("تم الطلب! انتظر تفعيل المدير");
        }
    }
</script>
</body>
</html>
