<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة نِحرير العلمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0c2340; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--primary); color: white; padding: 25px; flex-shrink: 0; }
        .sidebar h2 { color: var(--gold); text-align: center; border-bottom: 1px solid #2c3e50; padding-bottom: 15px; }
        .nav-link { display: block; padding: 15px; color: #ecf0f1; text-decoration: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--primary); font-weight: bold; }
        .main { flex-grow: 1; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid transparent; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.1rem; color: var(--primary); }
        .btn-view { display: inline-block; margin-top: 15px; padding: 8px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 5px; font-size: 0.9rem; }
        .search-bar { width: 100%; max-width: 500px; padding: 12px; border-radius: 25px; border: 2px solid #ddd; margin-bottom: 30px; outline: none; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>نِحرير</h2>
    <div class="nav-link" id="homeLink" onclick="showMainCategories()"><i class="fas fa-th-large"></i> الأقسام الطبية</div>
    <div class="nav-link" onclick="loadData('books')"><i class="fas fa-book"></i> كتب علمية</div>
    <div class="nav-link" onclick="loadData('research')"><i class="fas fa-microscope"></i> دراسات وأبحاث</div>
    <a href="index.html" class="nav-link" style="background:#c0392b; margin-top:30px; text-align:center;">خروج</a>
</div>
<div class="main">
    <input type="text" id="search" class="search-bar" placeholder="ابحث عن مادة..." onkeyup="searchItems()">
    <h1 id="viewTitle">المحاضرات الطبية</h1>
    <div id="gridArea" class="grid"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAOiRs8QWVxo0FMmFJrv_KTNDNvxrp8TzE",
        authDomain: "nihrir-7527c.firebaseapp.com",
        projectId: "nihrir-7527c",
        storageBucket: "nihrir-7527c.firebasestorage.app",
        messagingSenderId: "912985166127",
        appId: "1:912985166127:web:b841722bdcad5d4ef6d1da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showMainCategories() {
        document.getElementById('viewTitle').innerText = "المحاضرات الطبية";
        const cats = [
            {n: 'الطب و الجراحة', i: 'fa-scalpel'}, {n: 'طب الأطفال', i: 'fa-baby'},
            {n: 'طب التخدير', i: 'fa-syringe'}, {n: 'طب النساء و التوليد', i: 'fa-female'},
            {n: 'طب المختبرات والتحاليل', i: 'fa-vials'}, {n: 'طب الأمراض الباطنية', i: 'fa-stethoscope'},
            {n: 'طب و جراحة العظام', i: 'fa-bone'}, {n: 'طب الأعصاب والعمود الفقري', i: 'fa-brain'}
        ];
        document.getElementById('gridArea').innerHTML = cats.map(c => `
            <div class="card" onclick="loadData('${c.n}')" style="cursor:pointer">
                <i class="fas ${c.i}"></i><h3>${c.n}</h3><p>استعراض الدروس</p>
            </div>`).join('');
    }

    async function loadData(category) {
        document.getElementById('viewTitle').innerText = category;
        const grid = document.getElementById('gridArea');
        grid.innerHTML = "جاري تحميل الموارد...";

        try {
            const snapshot = await db.collection('nihrir_data').where('category', '==', category).get();
            grid.innerHTML = "";
            if(snapshot.empty) {
                grid.innerHTML = "<p>لا يوجد محتوى مضاف في هذا القسم حالياً.</p>";
                return;
            }
            snapshot.forEach(doc => {
                const item = doc.data();
                grid.innerHTML += `
                    <div class="card item-card">
                        <i class="fas fa-file-pdf"></i>
                        <h3>${item.title}</h3>
                        <p>${item.description || ''}</p>
                        <a href="${item.link}" target="_blank" class="btn-view">عرض المحتوى</a>
                    </div>`;
            });
        } catch(e) { grid.innerHTML = "حدث خطأ في الجلب."; }
    }

    function searchItems() {
        let val = document.getElementById('search').value.toLowerCase();
        let items = document.getElementsByClassName('item-card');
        Array.from(items).forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    window.onload = showMainCategories;
</script>
</body>
</html>
